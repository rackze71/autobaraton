<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carrito — Autobaratón</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="estilos.css">
</head>
<body class="bg-gray-50">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between h-16 items-center">
            <a href="index.html" class="text-2xl font-bold">Auto<span class="text-emerald-500">baratón</span></a>
            <a href="index.html" class="text-slate-600 hover:text-emerald-500 text-sm"><i class="fas fa-arrow-left mr-1"></i> Seguir comprando</a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-10">
        <h1 class="text-3xl font-bold mb-6">Tu Carrito</h1>

        <div id="carrito-vacio" class="hidden text-center py-16">
            <i class="fas fa-shopping-cart text-6xl text-slate-300 mb-4"></i>
            <p class="text-slate-500 mb-4">Tu carrito está vacío</p>
            <a href="index.html" class="bg-emerald-500 text-white px-6 py-3 rounded-xl font-semibold">Ver catálogo</a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-4">
                <div id="carrito-items"></div>
            </div>

            <div class="bg-white rounded-2xl p-6 shadow-sm h-fit sticky top-24">
                <h3 class="font-bold text-lg mb-4">Resumen</h3>
                <div class="space-y-2 text-sm mb-4">
                    <div class="flex justify-between"><span>Subtotal</span><span id="resumen-subtotal">$0</span></div>
                    <div class="flex justify-between"><span>Trámites</span><span>$5,000</span></div>
                    <div class="flex justify-between"><span>Entrega</span><span class="text-emerald-600">Gratis</span></div>
                    <hr class="my-2">
                    <div class="flex justify-between font-bold text-lg"><span>Total</span><span id="resumen-total">$0</span></div>
                </div>
                <a href="checkout.html" id="btn-checkout" class="block w-full bg-slate-900 hover:bg-slate-800 text-white text-center py-3 rounded-xl font-semibold">
                    Proceder al pago <i class="fas fa-arrow-right ml-1"></i>
                </a>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
