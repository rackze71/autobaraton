<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autobaratón — Catálogo 2025</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="estilos.css">
</head>
<body class="bg-gray-50">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between h-16 items-center">
            <a href="index.html" class="text-2xl font-bold">Auto<span class="text-emerald-500">baratón</span></a>
            <div class="flex items-center gap-6">
                <a href="carrito.html" class="relative text-slate-700 hover:text-emerald-500">
                    <i class="fas fa-shopping-cart text-xl"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-emerald-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
                </a>
            </div>
        </div>
    </nav>

    <header class="bg-slate-900 text-white py-16">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Catálogo de Autos 2025</h1>
            <p class="text-slate-300 text-lg">Más de 500 unidades certificadas. Entrega a domicilio.</p>
        </div>
    </header>

    <section class="max-w-7xl mx-auto px-4 py-12">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold">Autos disponibles</h2>
            <select id="filtro-marca" class="px-4 py-2 rounded-lg border border-gray-200 text-sm">
                <option value="">Todas las marcas</option>
                <option value="Toyota">Toyota</option>
                <option value="Nissan">Nissan</option>
                <option value="Honda">Honda</option>
                <option value="Mazda">Mazda</option>
                <option value="Volkswagen">Volkswagen</option>
                <option value="Kia">Kia</option>
            </select>
        </div>

        <div id="catalogo-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </section>

    <footer class="bg-slate-900 text-slate-400 py-8 text-center text-sm">
        © 2025 Autobaratón. Todos los derechos reservados.
    </footer>

    <script src="app.js"></script>
</body>
</html>
